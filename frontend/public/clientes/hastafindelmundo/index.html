<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="description" content="Hasta Fin del Mundo - Punto de Venta y Kiosco" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Hasta Fin del Mundo">
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>Hasta Fin del Mundo</title>
  </head>
  <body>
    <noscript>Necesitas habilitar JavaScript para ejecutar esta aplicación.</noscript>
    <div id="root"></div>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('⚡ PWA: Service Worker instalado con éxito en el arranque.', reg.scope))
            .catch(err => console.error('❌ PWA: Fallo al registrar Service Worker en el arranque.', err));
        });
      }
    </script>
  </body>
</html>
